---
name: Issue Flow Gate

on:
  pull_request:
    types: [opened, edited, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  issue-flow:
    name: Issue flow
    uses: jai/trips-ci/.github/workflows/issue-flow-gate.yaml@main
    secrets:
      CODEX_REVIEW_GH_TOKEN: ${{ secrets.CODEX_REVIEW_GH_TOKEN }}
