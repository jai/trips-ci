# Claude Full Review Workflow (reusable)
# Extracted from code-review.yaml full-review path.
# Handles:
#   1. pull_request events (opened, reopened, ready_for_review, synchronize, review_requested)
#   2. /review slash command on PR issue_comment events
# CI owns final approve/request-changes orchestration.

---
name: Claude Full Review

on:
  workflow_call:
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true
      CLAUDE_REVIEW_GH_TOKEN:
        required: true
    outputs:
      decision_found:
        description: "Whether a valid CLAUDE_REVIEW_DECISION marker was found"
        value: ${{ jobs.review.outputs.decision_found }}
      decision:
        description: "Parsed decision value (APPROVE|REQUEST_CHANGES)"
        value: ${{ jobs.review.outputs.decision }}
      blocker:
        description: "Parsed BLOCKER value (for REQUEST_CHANGES)"
        value: ${{ jobs.review.outputs.blocker }}
      next_action:
        description: "Parsed NEXT_ACTION value (for REQUEST_CHANGES)"
        value: ${{ jobs.review.outputs.next_action }}
      pr_number:
        description: "PR number processed by this run"
        value: ${{ jobs.review.outputs.pr_number }}
      head_sha:
        description: "Current PR head SHA"
        value: ${{ jobs.review.outputs.head_sha }}
      total_threads:
        description: "Total review thread count observed during orchestration"
        value: ${{ jobs.review-orchestration.outputs.total_threads }}
      unresolved_threads:
        description: "Unresolved review thread count observed during orchestration"
        value: ${{ jobs.review-orchestration.outputs.unresolved_threads }}
      # Backward-compatible aliases
      found:
        description: "Alias of decision_found"
        value: ${{ jobs.review.outputs.found }}
      ready:
        description: "Alias: true when decision=APPROVE"
        value: ${{ jobs.review.outputs.ready }}

permissions:
  contents: read
  issues: write
  pull-requests: write
  actions: read

jobs:
  review:
    runs-on: ubicloud-standard-2
    timeout-minutes: 30
    env:
      # Force AI review actions to use the FINN DevOps PAT so downstream workflows are triggered
      GITHUB_TOKEN: ${{ secrets.CLAUDE_REVIEW_GH_TOKEN }}
      GH_TOKEN: ${{ secrets.CLAUDE_REVIEW_GH_TOKEN }}
    outputs:
      decision_found: ${{ steps.set-outputs.outputs.decision_found }}
      decision: ${{ steps.set-outputs.outputs.decision }}
      blocker: ${{ steps.set-outputs.outputs.blocker }}
      next_action: ${{ steps.set-outputs.outputs.next_action }}
      pr_number: ${{ steps.set-outputs.outputs.pr_number }}
      head_sha: ${{ steps.set-outputs.outputs.head_sha }}
      # Backward-compatible aliases
      found: ${{ steps.set-outputs.outputs.found }}
      ready: ${{ steps.set-outputs.outputs.ready }}
    if: |
      (
        github.event_name == 'pull_request' &&
        (
          github.event.action == 'opened' ||
          github.event.action == 'reopened' ||
          github.event.action == 'ready_for_review' ||
          github.event.action == 'synchronize' ||
          github.event.action == 'review_requested'
        )
      ) ||
      (
        github.event_name == 'issue_comment' &&
        startsWith(github.event.comment.body, '/review')
      )
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.CLAUDE_REVIEW_GH_TOKEN }}

      - name: Extract PR number
        id: extract-pr
        shell: bash
        run: |
          set -euo pipefail
          echo "Event: ${{ github.event_name }}"

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
            echo "📋 PR number from pull_request event: $PR_NUMBER"
          elif [[ "${{ github.event_name }}" == "issue_comment" ]]; then
            # For issue_comment events on PRs, PR number is issue.number
            if [[ "${{ github.event.issue.pull_request }}" != "" ]]; then
              PR_NUMBER="${{ github.event.issue.number }}"
              echo "💬 PR number from issue_comment event: $PR_NUMBER"
            else
              echo "⚠️ Issue comment is not on a PR, skipping"
              echo "::notice::Skipping: Comment is on an issue, not a pull request"
              echo "has_pr=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          else
            echo "⚠️ Could not determine PR number for event: ${{ github.event_name }}"
            echo "::error::Unsupported event type: ${{ github.event_name }}"
            exit 1
          fi

          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "has_pr=true" >> "$GITHUB_OUTPUT"
          echo "✅ Using PR number: $PR_NUMBER"

      - name: Fetch PR head SHA
        id: fetch-pr
        if: steps.extract-pr.outputs.has_pr == 'true'
        shell: bash
        run: |
          set -euo pipefail

          PR_NUMBER="${{ steps.extract-pr.outputs.pr_number }}"
          HEAD_SHA=$(gh api repos/${{ github.repository }}/pulls/${PR_NUMBER} --jq '.head.sha')

          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "✅ PR #${PR_NUMBER} head SHA: ${HEAD_SHA}"

      - name: Extract full-review context
        id: extract-context
        if: steps.extract-pr.outputs.has_pr == 'true'
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          COMMENT_BODY_ISSUE: ${{ github.event_name == 'issue_comment' && github.event.comment.body || '' }}
          COMMENT_AUTHOR_ISSUE: ${{ github.event_name == 'issue_comment' && github.event.comment.user.login || '' }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login || '' }}
        run: |
          set -euo pipefail

          CONTEXT_TYPE=""
          COMMENT_AUTHOR=""
          COMMENT_BODY=""
          SLASH_ARGS=""
          TRIGGER_DESC=""

          if [[ "$EVENT_NAME" == "issue_comment" ]]; then
            CONTEXT_TYPE="slash_review"
            COMMENT_AUTHOR="$COMMENT_AUTHOR_ISSUE"
            COMMENT_BODY="$COMMENT_BODY_ISSUE"

            # Robust /review parsing (supports optional args, including multiline)
            if [[ "$COMMENT_BODY" =~ ^/review([[:space:]]|$) ]]; then
              SLASH_ARGS=$(printf '%s' "$COMMENT_BODY" | sed -E '1s#^/review[[:space:]]*##')
              TRIGGER_DESC="/review slash command"
            else
              echo "::notice::Comment did not match /review command; skipping"
              echo "has_review_trigger=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          else
            CONTEXT_TYPE="pr_event"
            COMMENT_AUTHOR="$PR_AUTHOR"
            COMMENT_BODY="PR event: ${EVENT_ACTION}"
            SLASH_ARGS=""
            TRIGGER_DESC="pull_request event (${EVENT_ACTION})"
          fi

          echo "context_type=$CONTEXT_TYPE" >> "$GITHUB_OUTPUT"
          echo "comment_author=$COMMENT_AUTHOR" >> "$GITHUB_OUTPUT"
          echo "trigger_desc=$TRIGGER_DESC" >> "$GITHUB_OUTPUT"
          echo "has_review_trigger=true" >> "$GITHUB_OUTPUT"

          echo "comment_body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$COMMENT_BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          echo "slash_args<<EOF" >> "$GITHUB_OUTPUT"
          echo "$SLASH_ARGS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          echo "✅ Extracted full-review context: ${CONTEXT_TYPE}"

      - name: Define review instructions
        id: review-instructions
        if: |
          steps.extract-pr.outputs.has_pr == 'true' &&
          steps.extract-context.outputs.has_review_trigger == 'true'
        shell: bash
        run: |
          REVIEW_INSTRUCTIONS="Perform a comprehensive code review with the following focus areas:

            1. **Code Quality**
               - Clean code principles and best practices
               - Proper error handling and edge cases
               - Code readability and maintainability

            2. **Security**
               - Check for potential security vulnerabilities
               - Validate input sanitization
               - Review authentication/authorization logic

            3. **Performance**
               - Identify potential performance bottlenecks
               - Review database queries for efficiency
               - Check for memory leaks or resource issues

            4. **Testing**
               - Verify adequate test coverage
               - Review test quality and edge cases
               - Check for missing test scenarios

            5. **Documentation**
               - Ensure code is properly documented
               - Verify README updates for new features
               - Check API documentation accuracy

            ## Direct Fixes (MANDATORY)
            - Primary objective: get this PR to merge-ready in this run.
            - For every blocking issue you find, you MUST implement the fix directly on this PR branch and push commit(s).
            - Iterate review -> fix -> verify until no blocking issues remain.
            - Do NOT delegate fixes to Copilot or ask another agent to implement them.
            - You MUST resolve ALL review threads before choosing DECISION=APPROVE. See the Review Thread Resolution section below.
            - For each thread: implement valid suggestions, dismiss false positives with rationale, then resolve.
            - You may choose DECISION=REQUEST_CHANGES only when hard-blocked by an external constraint you cannot resolve in-workflow.
              Hard-block examples:
              - no permission/policy to push to the PR branch
              - unresolved merge conflict/rebase that cannot be completed in this workflow
              - required secret or external system unavailable
              - missing product/owner decision required to proceed
            - When hard-blocked, post one explicit BLOCKED: summary comment with the exact blocker and exact next action.

            Use inline comments ONLY for issues that need to be fixed or changed.
            Do NOT leave inline comments for praise or positive observations.
            Post a final summary comment using 'gh pr comment'.

            ## Review Thread Resolution (MANDATORY — zero unresolved threads before approve)
            Before finalizing, you MUST inspect ALL open review threads on this PR and resolve every single one.
            Use gh api graphql with the resolveReviewThread mutation to resolve threads programmatically.

            For each unresolved thread, apply ONE of these actions:
            1. **Valid suggestion** → Implement the fix, push a commit, reply confirming the fix, then RESOLVE the thread.
            2. **False positive / not applicable** → Reply explaining WHY it's incorrect or not relevant, then RESOLVE the thread.
            3. **Already addressed** → Reply noting where/how it was addressed, then RESOLVE the thread.
            4. **Intentional design choice** → Reply with the rationale, then RESOLVE the thread.

            Escape hatch (rare — use sparingly):
            5. **Genuinely blocked** (needs human product decision, external dependency, or repo permission you lack) →
               Reply with BLOCKED: [exact reason] in the thread. Do NOT resolve.

            The rule is simple: **zero unresolved threads = can choose DECISION=APPROVE. Any unresolved thread = must not choose DECISION=APPROVE.**

            ## Structured Decision Marker (required)
            At the end of each full review, post EXACTLY one PR comment containing this exact marker block:
            <!-- CLAUDE_REVIEW_DECISION -->
            DECISION=APPROVE|REQUEST_CHANGES
            BLOCKER=<required when DECISION=REQUEST_CHANGES>
            NEXT_ACTION=<required when DECISION=REQUEST_CHANGES>
            <!-- /CLAUDE_REVIEW_DECISION -->

            Rules:
            - Always emit DECISION.
            - Include BLOCKER and NEXT_ACTION only when DECISION=REQUEST_CHANGES.
            - Do NOT run 'gh pr review --approve' or 'gh pr review --request-changes'.
            - CI workflow will submit the final review action after parsing this marker."

          echo "instructions<<EOF" >> "$GITHUB_OUTPUT"
          echo "$REVIEW_INSTRUCTIONS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          echo "✅ Review instructions defined"

      - name: Craft full-review prompt
        id: craft-prompt
        if: |
          steps.extract-pr.outputs.has_pr == 'true' &&
          steps.extract-context.outputs.has_review_trigger == 'true'
        shell: bash
        run: |
          set -euo pipefail

          REVIEW_INSTRUCTIONS=$(cat <<'REVIEW_EOF'
          ${{ steps.review-instructions.outputs.instructions }}
          REVIEW_EOF
          )

          BASE_CONTEXT="REPO: ${{ github.repository }}
          PR NUMBER: ${{ steps.extract-pr.outputs.pr_number }}

          ## Trigger Context
          - **Type**: ${{ steps.extract-context.outputs.context_type }}
          - **Trigger**: ${{ steps.extract-context.outputs.trigger_desc }}
          - **Author**: @${{ steps.extract-context.outputs.comment_author }}"

          if [[ "${{ steps.extract-context.outputs.context_type }}" == "slash_review" ]]; then
            FULL_PROMPT="${BASE_CONTEXT}

          ## Slash Command
          The user triggered /review on this PR.
          Treat this as an explicit request for a full review.

          Additional user instructions from /review (if any):
          ${{ steps.extract-context.outputs.slash_args }}

          ${REVIEW_INSTRUCTIONS}

          IMPORTANT: Post your final summary as a PR comment with:
          gh pr comment --body 'Your response here'"
          else
            FULL_PROMPT="${BASE_CONTEXT}

          This PR event was triggered by action: ${{ github.event.action }}.
          ${REVIEW_INSTRUCTIONS}"
          fi

          echo "prompt<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FULL_PROMPT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          echo "✅ Crafted full-review prompt"

      - name: Check track_progress support
        id: check-track-progress
        if: |
          steps.extract-pr.outputs.has_pr == 'true' &&
          steps.extract-context.outputs.has_review_trigger == 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "Event: ${{ github.event_name }}, Action: ${{ github.event.action }}"

          case "${{ github.event_name }}" in
            pull_request)
              case "${{ github.event.action }}" in
                ready_for_review)
                  echo "track_progress=true" >> "$GITHUB_OUTPUT"
                  echo "✅ track_progress supported for pull_request/${{ github.event.action }}"
                  ;;
                *)
                  echo "track_progress=false" >> "$GITHUB_OUTPUT"
                  echo "⚠️ track_progress not supported for pull_request/${{ github.event.action }}"
                  ;;
              esac
              ;;
            *)
              echo "track_progress=false" >> "$GITHUB_OUTPUT"
              echo "⚠️ track_progress not supported for ${{ github.event_name }}/${{ github.event.action }}"
              ;;
          esac

      - name: Capture review start timestamp
        id: review-started-at
        if: |
          steps.extract-pr.outputs.has_pr == 'true' &&
          steps.extract-context.outputs.has_review_trigger == 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "started_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Run Claude full review
        uses: anthropics/claude-code-action@v1
        if: |
          steps.extract-pr.outputs.has_pr == 'true' &&
          steps.extract-context.outputs.has_review_trigger == 'true'
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.CLAUDE_REVIEW_GH_TOKEN }}
          track_progress: ${{ steps.check-track-progress.outputs.track_progress }}
          claude_args: |
            --model opus
            --allowedTools "mcp__github__add_comment_to_pending_review,
            mcp__github__add_pull_request_review_comment,
            mcp__github__create_issue_comment,
            mcp__github__get_file_contents,
            mcp__github__get_pull_request_diff,
            mcp__github_ci__get_ci_status,
            mcp__github_ci__get_workflow_run_details,
            mcp__github_ci__download_job_log,
            mcp__github_comment__update_claude_comment,
            mcp__github_inline_comment__create_inline_comment,
            mcp__github_pulls__get_pull_request,
            mcp__github_pulls__list_pull_request_files,
            mcp__github_pulls__get_pull_request_diff,
            Bash,Read,Grep,Glob,WebFetch,WebSearch,TodoWrite"
          prompt: ${{ steps.craft-prompt.outputs.prompt }}

      - name: Parse structured review decision
        id: parse-review-decision
        if: |
          steps.extract-pr.outputs.has_pr == 'true' &&
          steps.extract-context.outputs.has_review_trigger == 'true'
        shell: bash
        run: |
          set -euo pipefail

          trim() {
            sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//'
          }

          PR_NUMBER="${{ steps.extract-pr.outputs.pr_number }}"
          RUN_STARTED_AT="${{ steps.review-started-at.outputs.started_at }}"
          AUTOMATION_LOGIN=$(gh api user --jq '.login')

          COMMENTS_JSON=$(gh api repos/${{ github.repository }}/issues/${PR_NUMBER}/comments --paginate)

          mapfile -t CANDIDATES < <(
            printf '%s' "$COMMENTS_JSON" | jq -r \
              --arg run_started_at "$RUN_STARTED_AT" \
              --arg automation_login "$AUTOMATION_LOGIN" '
              [
                .[]
                | select(.user.login == $automation_login)
                | select(.created_at >= $run_started_at)
                | select(.body | contains("<!-- CLAUDE_REVIEW_DECISION -->"))
                | select(.body | contains("<!-- /CLAUDE_REVIEW_DECISION -->"))
              ]
              | sort_by(.created_at)
              | reverse
              | .[]
              | @base64
            '
          )

          DECISION_FOUND="false"
          DECISION=""
          BLOCKER=""
          NEXT_ACTION=""

          for entry in "${CANDIDATES[@]}"; do
            COMMENT_BODY=$(printf '%s' "$entry" | base64 -d | jq -r '.body // empty')

            MARKER_BLOCK=$(printf '%s\n' "$COMMENT_BODY" | awk '
              /<!-- CLAUDE_REVIEW_DECISION -->/ {in_block=1; next}
              /<!-- \/CLAUDE_REVIEW_DECISION -->/ {in_block=0}
              in_block {print}
            ')

            CANDIDATE_DECISION=$(printf '%s\n' "$MARKER_BLOCK" | awk '/^DECISION=/{sub(/^DECISION=/,""); print; exit}' | tr -d '\r' | trim)
            CANDIDATE_BLOCKER=$(printf '%s\n' "$MARKER_BLOCK" | awk '/^BLOCKER=/{sub(/^BLOCKER=/,""); print; exit}' | tr -d '\r' | trim)
            CANDIDATE_NEXT_ACTION=$(printf '%s\n' "$MARKER_BLOCK" | awk '/^NEXT_ACTION=/{sub(/^NEXT_ACTION=/,""); print; exit}' | tr -d '\r' | trim)

            case "$CANDIDATE_DECISION" in
              APPROVE)
                DECISION_FOUND="true"
                DECISION="APPROVE"
                BLOCKER=""
                NEXT_ACTION=""
                break
                ;;
              REQUEST_CHANGES)
                if [[ -n "$CANDIDATE_BLOCKER" && -n "$CANDIDATE_NEXT_ACTION" ]]; then
                  DECISION_FOUND="true"
                  DECISION="REQUEST_CHANGES"
                  BLOCKER="$CANDIDATE_BLOCKER"
                  NEXT_ACTION="$CANDIDATE_NEXT_ACTION"
                  break
                fi
                ;;
              *)
                ;;
            esac
          done

          echo "decision_found=${DECISION_FOUND}" >> "$GITHUB_OUTPUT"
          echo "decision=${DECISION}" >> "$GITHUB_OUTPUT"

          echo "blocker<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BLOCKER" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          echo "next_action<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NEXT_ACTION" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          if [[ "$DECISION_FOUND" == "true" ]]; then
            echo "✅ Parsed decision marker: ${DECISION}"
          else
            echo "::error::No valid CLAUDE_REVIEW_DECISION marker found after ${RUN_STARTED_AT}; failing closed (no workflow-submitted review action)."
            exit 1
          fi

      - name: Set reusable workflow outputs
        id: set-outputs
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          DECISION_FOUND="false"
          DECISION=""
          BLOCKER=""
          NEXT_ACTION=""
          PR_NUMBER=""
          HEAD_SHA=""
          FOUND_ALIAS="false"
          READY_ALIAS="false"

          if [[ "${{ steps.extract-pr.outputs.has_pr || 'false' }}" == "true" ]]; then
            PR_NUMBER="${{ steps.extract-pr.outputs.pr_number }}"
            HEAD_SHA="${{ steps.fetch-pr.outputs.head_sha }}"
          fi

          if [[ "${{ steps.parse-review-decision.outputs.decision_found || 'false' }}" == "true" ]]; then
            DECISION_FOUND="true"
            FOUND_ALIAS="true"
            DECISION="${{ steps.parse-review-decision.outputs.decision }}"
            BLOCKER="${{ steps.parse-review-decision.outputs.blocker }}"
            NEXT_ACTION="${{ steps.parse-review-decision.outputs.next_action }}"
            if [[ "$DECISION" == "APPROVE" ]]; then
              READY_ALIAS="true"
            fi
          fi

          echo "decision_found=${DECISION_FOUND}" >> "$GITHUB_OUTPUT"
          echo "decision=${DECISION}" >> "$GITHUB_OUTPUT"

          echo "blocker<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BLOCKER" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          echo "next_action<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NEXT_ACTION" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "head_sha=${HEAD_SHA}" >> "$GITHUB_OUTPUT"

          # Backward-compatible aliases
          echo "found=${FOUND_ALIAS}" >> "$GITHUB_OUTPUT"
          echo "ready=${READY_ALIAS}" >> "$GITHUB_OUTPUT"

          echo "✅ Outputs prepared: decision_found=${DECISION_FOUND}, decision=${DECISION}, pr_number=${PR_NUMBER}, head_sha=${HEAD_SHA}"

  review-orchestration:
    name: Review Orchestration
    needs: review
    if: ${{ needs.review.outputs.decision_found == 'true' }}
    runs-on: ubicloud-standard-2
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
      actions: read
    outputs:
      total_threads: ${{ steps.thread-counts.outputs.total_threads }}
      unresolved_threads: ${{ steps.thread-counts.outputs.unresolved_threads }}
    env:
      GITHUB_TOKEN: ${{ secrets.CLAUDE_REVIEW_GH_TOKEN }}
      GH_TOKEN: ${{ secrets.CLAUDE_REVIEW_GH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.CLAUDE_REVIEW_GH_TOKEN }}

      - name: Fetch PR metadata
        id: pr-meta
        shell: bash
        run: |
          set -euo pipefail

          PR_NUMBER="${{ needs.review.outputs.pr_number }}"
          INPUT_HEAD_SHA="${{ needs.review.outputs.head_sha }}"
          DECISION="${{ needs.review.outputs.decision }}"

          PR_JSON=$(gh api repos/${{ github.repository }}/pulls/${PR_NUMBER})

          IS_DRAFT=$(printf '%s' "$PR_JSON" | jq -r '.draft')
          HEAD_REF=$(printf '%s' "$PR_JSON" | jq -r '.head.ref')
          HEAD_REPO=$(printf '%s' "$PR_JSON" | jq -r '.head.repo.full_name')
          CURRENT_HEAD_SHA=$(printf '%s' "$PR_JSON" | jq -r '.head.sha')
          PR_AUTHOR_LOGIN=$(printf '%s' "$PR_JSON" | jq -r '.user.login')
          AUTOMATION_LOGIN=$(gh api user --jq '.login')

          CAN_SUBMIT_APPROVAL="true"
          if [[ "$DECISION" == "APPROVE" && "$AUTOMATION_LOGIN" == "$PR_AUTHOR_LOGIN" ]]; then
            CAN_SUBMIT_APPROVAL="false"
            echo "::notice::PR #${PR_NUMBER} is authored by @${PR_AUTHOR_LOGIN} and workflow identity is also @${AUTOMATION_LOGIN}; skipping workflow-owned approval to avoid self-approval failure."
          fi

          if [[ "$INPUT_HEAD_SHA" != "$CURRENT_HEAD_SHA" ]]; then
            echo "::notice::Input head_sha (${INPUT_HEAD_SHA}) differs from current PR head (${CURRENT_HEAD_SHA}); using current PR head SHA."
          fi

          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "decision=${DECISION}" >> "$GITHUB_OUTPUT"
          echo "is_draft=${IS_DRAFT}" >> "$GITHUB_OUTPUT"
          echo "head_ref=${HEAD_REF}" >> "$GITHUB_OUTPUT"
          echo "head_repo=${HEAD_REPO}" >> "$GITHUB_OUTPUT"
          echo "head_sha=${CURRENT_HEAD_SHA}" >> "$GITHUB_OUTPUT"
          echo "pr_author_login=${PR_AUTHOR_LOGIN}" >> "$GITHUB_OUTPUT"
          echo "automation_login=${AUTOMATION_LOGIN}" >> "$GITHUB_OUTPUT"
          echo "can_submit_approval=${CAN_SUBMIT_APPROVAL}" >> "$GITHUB_OUTPUT"

          echo "blocker<<EOF" >> "$GITHUB_OUTPUT"
          echo "${{ needs.review.outputs.blocker }}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          echo "next_action<<EOF" >> "$GITHUB_OUTPUT"
          echo "${{ needs.review.outputs.next_action }}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Compute unresolved review-thread counts (paginate all pages)
        id: thread-counts
        shell: bash
        run: |
          set -euo pipefail

          PR_NUMBER="${{ steps.pr-meta.outputs.pr_number }}"
          OWNER="${{ github.repository_owner }}"
          REPO="${GITHUB_REPOSITORY#*/}"

          QUERY='query($owner:String!, $repo:String!, $number:Int!, $after:String) {
            repository(owner:$owner, name:$repo) {
              pullRequest(number:$number) {
                reviewThreads(first:100, after:$after) {
                  nodes { isResolved }
                  pageInfo { hasNextPage endCursor }
                }
              }
            }
          }'

          AFTER=""
          PAGE=1
          TOTAL_THREADS=0
          UNRESOLVED_THREADS=0

          while true; do
            if [[ -n "$AFTER" ]]; then
              RESPONSE=$(gh api graphql \
                -f query="$QUERY" \
                -f owner="$OWNER" \
                -f repo="$REPO" \
                -F number="$PR_NUMBER" \
                -f after="$AFTER")
            else
              RESPONSE=$(gh api graphql \
                -f query="$QUERY" \
                -f owner="$OWNER" \
                -f repo="$REPO" \
                -F number="$PR_NUMBER")
            fi

            if [[ "$(printf '%s' "$RESPONSE" | jq -r '.data.repository.pullRequest == null')" == "true" ]]; then
              echo "::error::Unable to load PR #${PR_NUMBER} review threads via GraphQL."
              exit 1
            fi

            PAGE_TOTAL=$(printf '%s' "$RESPONSE" | jq '.data.repository.pullRequest.reviewThreads.nodes | length')
            PAGE_UNRESOLVED=$(printf '%s' "$RESPONSE" | jq '[.data.repository.pullRequest.reviewThreads.nodes[] | select(.isResolved == false)] | length')

            TOTAL_THREADS=$((TOTAL_THREADS + PAGE_TOTAL))
            UNRESOLVED_THREADS=$((UNRESOLVED_THREADS + PAGE_UNRESOLVED))

            HAS_NEXT=$(printf '%s' "$RESPONSE" | jq -r '.data.repository.pullRequest.reviewThreads.pageInfo.hasNextPage')
            if [[ "$HAS_NEXT" != "true" ]]; then
              break
            fi

            AFTER=$(printf '%s' "$RESPONSE" | jq -r '.data.repository.pullRequest.reviewThreads.pageInfo.endCursor // empty')
            if [[ -z "$AFTER" ]]; then
              echo "::error::Pagination indicated hasNextPage=true but endCursor was empty (page ${PAGE})."
              exit 1
            fi

            PAGE=$((PAGE + 1))
          done

          echo "total_threads=${TOTAL_THREADS}" >> "$GITHUB_OUTPUT"
          echo "unresolved_threads=${UNRESOLVED_THREADS}" >> "$GITHUB_OUTPUT"

          echo "Checked ${TOTAL_THREADS} review threads across ${PAGE} page(s); unresolved=${UNRESOLVED_THREADS}."

      - name: Enforce approval precondition (unresolved threads must be zero)
        if: steps.pr-meta.outputs.decision == 'APPROVE'
        shell: bash
        run: |
          set -euo pipefail

          PR_NUMBER="${{ steps.pr-meta.outputs.pr_number }}"
          UNRESOLVED_THREADS="${{ steps.thread-counts.outputs.unresolved_threads }}"

          if [[ "$UNRESOLVED_THREADS" -gt 0 ]]; then
            echo "::error::DECISION=APPROVE requires unresolved_threads=0, but PR #${PR_NUMBER} has ${UNRESOLVED_THREADS} unresolved review thread(s)."
            exit 1
          fi

          echo "✅ Approval precondition satisfied: unresolved_threads=0"

      - name: Draft → ready transition
        if: |
          steps.pr-meta.outputs.decision == 'APPROVE' &&
          steps.pr-meta.outputs.is_draft == 'true'
        shell: bash
        run: |
          set -euo pipefail
          gh pr ready "${{ steps.pr-meta.outputs.pr_number }}" --repo "${{ github.repository }}"

      - name: Skip CI trigger commit for fork PRs
        if: |
          steps.pr-meta.outputs.decision == 'APPROVE' &&
          steps.pr-meta.outputs.head_repo != github.repository
        shell: bash
        run: |
          set -euo pipefail
          echo "::notice::PR #${{ steps.pr-meta.outputs.pr_number }} head repo is ${{ steps.pr-meta.outputs.head_repo }}; skipping empty commit because branch is not local to target repo."

      - name: Evaluate check runs for trigger-commit eligibility
        id: checks
        if: |
          steps.pr-meta.outputs.decision == 'APPROVE' &&
          steps.pr-meta.outputs.head_repo == github.repository
        shell: bash
        run: |
          set -euo pipefail

          HEAD_SHA="${{ steps.pr-meta.outputs.head_sha }}"

          CHECKS_JSON=$(gh api repos/${{ github.repository }}/commits/${HEAD_SHA}/check-runs)
          TOTAL_CHECKS=$(printf '%s' "$CHECKS_JSON" | jq -r '.total_count // 0')
          ACTION_REQUIRED_CHECKS=$(printf '%s' "$CHECKS_JSON" | jq -r '[.check_runs[]? | select(.conclusion == "action_required")] | length')

          SHOULD_TRIGGER="false"
          TRIGGER_REASON=""

          if [[ "$ACTION_REQUIRED_CHECKS" -gt 0 ]]; then
            SHOULD_TRIGGER="true"
            TRIGGER_REASON="action_required checks (${ACTION_REQUIRED_CHECKS}/${TOTAL_CHECKS})"
          elif [[ "$TOTAL_CHECKS" -eq 0 ]]; then
            SHOULD_TRIGGER="true"
            TRIGGER_REASON="no check-runs found on head SHA (likely missing ready_for_review trigger in caller workflows)"
          fi

          echo "total_checks=${TOTAL_CHECKS}" >> "$GITHUB_OUTPUT"
          echo "action_required_checks=${ACTION_REQUIRED_CHECKS}" >> "$GITHUB_OUTPUT"
          echo "should_trigger=${SHOULD_TRIGGER}" >> "$GITHUB_OUTPUT"
          echo "trigger_reason=${TRIGGER_REASON}" >> "$GITHUB_OUTPUT"

      - name: Skip trigger commit when checks are already healthy
        if: |
          steps.pr-meta.outputs.decision == 'APPROVE' &&
          steps.pr-meta.outputs.head_repo == github.repository &&
          steps.checks.outputs.should_trigger != 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "::notice::PR #${{ steps.pr-meta.outputs.pr_number }} has checks (${{ steps.checks.outputs.total_checks }}) and none are action_required. Skipping empty commit."

      - name: Prevent duplicate trigger commit
        id: duplicate-commit
        if: |
          steps.pr-meta.outputs.decision == 'APPROVE' &&
          steps.pr-meta.outputs.head_repo == github.repository &&
          steps.checks.outputs.should_trigger == 'true'
        shell: bash
        run: |
          set -euo pipefail

          PR_NUMBER="${{ steps.pr-meta.outputs.pr_number }}"

          TRIGGER_COMMIT_COUNT=$(gh api repos/${{ github.repository }}/pulls/${PR_NUMBER}/commits --paginate \
            | jq -rs '[.[] | .[] | .commit.message | split("\n")[0] | select(startswith("ci: trigger checks after claude review decision"))] | length')

          if [[ "$TRIGGER_COMMIT_COUNT" -gt 0 ]]; then
            echo "already_triggered=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_triggered=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip duplicate trigger commit
        if: |
          steps.pr-meta.outputs.decision == 'APPROVE' &&
          steps.pr-meta.outputs.head_repo == github.repository &&
          steps.checks.outputs.should_trigger == 'true' &&
          steps.duplicate-commit.outputs.already_triggered == 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "::notice::PR #${{ steps.pr-meta.outputs.pr_number }} already has a CI trigger empty commit. Skipping additional empty commit."

      - name: Push empty commit to trigger CI checks
        if: |
          steps.pr-meta.outputs.decision == 'APPROVE' &&
          steps.pr-meta.outputs.head_repo == github.repository &&
          steps.checks.outputs.should_trigger == 'true' &&
          steps.duplicate-commit.outputs.already_triggered != 'true'
        shell: bash
        run: |
          set -euo pipefail

          HEAD_REF="${{ steps.pr-meta.outputs.head_ref }}"

          echo "ℹ️ PR #${{ steps.pr-meta.outputs.pr_number }}: ${{ steps.checks.outputs.trigger_reason }}. Pushing one empty commit to trigger CI."

          git config user.name "Claude PR Assistant"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin "$HEAD_REF"
          git switch -C "$HEAD_REF" "origin/$HEAD_REF"
          git commit --allow-empty -m "ci: trigger checks after claude review decision"
          git push origin "HEAD:$HEAD_REF"

      - name: Skip workflow-owned APPROVED review for self-authored PR
        if: |
          steps.pr-meta.outputs.decision == 'APPROVE' &&
          steps.pr-meta.outputs.can_submit_approval != 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "::notice::Skipping workflow-owned approval for PR #${{ steps.pr-meta.outputs.pr_number }} because @${{ steps.pr-meta.outputs.automation_login }} cannot approve their own pull request (@${{ steps.pr-meta.outputs.pr_author_login }})."

      - name: Submit workflow-owned APPROVED review
        if: |
          steps.pr-meta.outputs.decision == 'APPROVE' &&
          steps.pr-meta.outputs.can_submit_approval == 'true'
        shell: bash
        run: |
          set -euo pipefail

          PR_NUMBER="${{ steps.pr-meta.outputs.pr_number }}"

          set +e
          REVIEW_OUTPUT=$(gh pr review "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --approve \
            --body "CI approval: Claude decision APPROVE and unresolved review threads = 0." 2>&1)
          REVIEW_EXIT=$?
          set -e

          if [[ "$REVIEW_EXIT" -ne 0 ]]; then
            if printf '%s' "$REVIEW_OUTPUT" | grep -qi "approve your own pull request"; then
              echo "::notice::Approval skipped gracefully: workflow identity cannot approve its own pull request."
              exit 0
            fi

            printf '%s\n' "$REVIEW_OUTPUT" >&2
            exit "$REVIEW_EXIT"
          fi

      - name: Submit workflow-owned REQUEST_CHANGES review
        if: steps.pr-meta.outputs.decision == 'REQUEST_CHANGES'
        shell: bash
        run: |
          set -euo pipefail

          PR_NUMBER="${{ steps.pr-meta.outputs.pr_number }}"
          BLOCKER="${{ steps.pr-meta.outputs.blocker }}"
          NEXT_ACTION="${{ steps.pr-meta.outputs.next_action }}"

          REVIEW_BODY=$(printf 'BLOCKED: %s\nNext action: %s' "$BLOCKER" "$NEXT_ACTION")

          gh pr review "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --request-changes \
            --body "$REVIEW_BODY"
