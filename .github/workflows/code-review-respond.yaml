# Codex conversational/inline response workflow
# Extracted from code-review.yaml for reusable routing

---
name: Codex PR Assistant Respond

on:
  workflow_call:
    inputs:
      codex_version:
        description: Codex CLI version to install (latest or exact semver)
        type: string
        required: false
        default: latest
      codex_model:
        description: Codex model to use for direct CLI response
        type: string
        required: false
        default: gpt-5.5
      codex_reasoning_effort:
        description: Codex reasoning effort (none|low|medium|high|xhigh)
        type: string
        required: false
        default: xhigh
    secrets:
      CODEX_AUTH_JSON:
        required: true
      CODEX_REVIEW_GH_TOKEN:
        required: true

permissions:
  contents: read
  issues: write
  pull-requests: write
  actions: read

jobs:
  respond:
    runs-on: ubicloud-standard-2
    timeout-minutes: 30
    if: |
      (
        github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '@codex') &&
        !startsWith(github.event.comment.body, '/')
      ) ||
      (
        github.event_name == 'pull_request_review_comment' &&
        contains(github.event.comment.body, '@codex')
      )
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.CODEX_REVIEW_GH_TOKEN }}
          persist-credentials: false

      - name: Extract PR number
        id: extract-pr
        shell: bash
        run: |
          set -euo pipefail
          echo "Event: ${{ github.event_name }}"

          if [[ "${{ github.event_name }}" == "issue_comment" ]]; then
            # For issue_comment events on PRs, the PR number is in issue.number
            # Verify this is actually a PR comment, not an issue comment
            if [[ "${{ github.event.issue.pull_request }}" != "" ]]; then
              PR_NUMBER="${{ github.event.issue.number }}"
              echo "💬 PR number from issue_comment event: $PR_NUMBER"
            else
              echo "⚠️ Issue comment is not on a PR, skipping"
              echo "::notice::Skipping: Comment is on an issue, not a pull request"
              echo "has_pr=false" >> $GITHUB_OUTPUT
              exit 0
            fi
          elif [[ "${{ github.event_name }}" == "pull_request_review_comment" ]]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
            echo "📝 PR number from pull_request_review_comment event: $PR_NUMBER"
          else
            echo "⚠️ Could not determine PR number for event: ${{ github.event_name }}"
            echo "::error::Unsupported event type: ${{ github.event_name }}"
            exit 1
          fi

          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "has_pr=true" >> $GITHUB_OUTPUT
          echo "✅ Using PR number: $PR_NUMBER"

      - name: Extract comment details
        id: extract-comment
        if: steps.extract-pr.outputs.has_pr == 'true'
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          COMMENT_BODY_ISSUE: ${{ github.event_name == 'issue_comment' && github.event.comment.body || '' }}
          COMMENT_BODY_REVIEW: >
            ${{ github.event_name == 'pull_request_review_comment' && github.event.comment.body || '' }}
          COMMENT_ID_ISSUE: ${{ github.event_name == 'issue_comment' && github.event.comment.id || '' }}
          COMMENT_ID_REVIEW: >
            ${{ github.event_name == 'pull_request_review_comment' && github.event.comment.id || '' }}
          COMMENT_URL_ISSUE: >
            ${{ github.event_name == 'issue_comment' && github.event.comment.html_url || '' }}
          COMMENT_URL_REVIEW: >
            ${{ github.event_name == 'pull_request_review_comment' && github.event.comment.html_url || '' }}
          COMMENT_AUTHOR_ISSUE: >
            ${{ github.event_name == 'issue_comment' && github.event.comment.user.login || '' }}
          COMMENT_AUTHOR_REVIEW: >
            ${{ github.event_name == 'pull_request_review_comment' && github.event.comment.user.login || '' }}
          REVIEW_FILE_PATH: >
            ${{ github.event_name == 'pull_request_review_comment' && github.event.comment.path || '' }}
          REVIEW_LINE: ${{ github.event_name == 'pull_request_review_comment' && github.event.comment.line || '' }}
          REVIEW_ORIG_LINE: >
            ${{ github.event_name == 'pull_request_review_comment' && github.event.comment.original_line || '' }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "issue_comment" ]]; then
            # PR comment (not inline)
            COMMENT_TYPE="pr_comment"
            COMMENT_BODY="$COMMENT_BODY_ISSUE"
            COMMENT_ID="$COMMENT_ID_ISSUE"
            COMMENT_URL="$COMMENT_URL_ISSUE"
            COMMENT_AUTHOR="$COMMENT_AUTHOR_ISSUE"
            FILE_PATH=""
            LINE_NUMBER=""

            echo "💬 PR Comment from @${COMMENT_AUTHOR}"
            echo "Comment ID: ${COMMENT_ID}"

          elif [[ "$EVENT_NAME" == "pull_request_review_comment" ]]; then
            # Inline code review comment
            COMMENT_TYPE="inline_comment"
            COMMENT_BODY="$COMMENT_BODY_REVIEW"
            COMMENT_ID="$COMMENT_ID_REVIEW"
            COMMENT_URL="$COMMENT_URL_REVIEW"
            COMMENT_AUTHOR="$COMMENT_AUTHOR_REVIEW"
            FILE_PATH="$REVIEW_FILE_PATH"
            LINE_NUMBER="${REVIEW_LINE:-$REVIEW_ORIG_LINE}"

            echo "📝 Inline Comment from @${COMMENT_AUTHOR}"
            echo "File: ${FILE_PATH}:${LINE_NUMBER}"
            echo "Comment ID: ${COMMENT_ID}"

          else
            echo "::error::Unsupported event type in extract-comment: $EVENT_NAME"
            exit 1
          fi

          echo "comment_type=$COMMENT_TYPE" >> $GITHUB_OUTPUT
          echo "comment_id=$COMMENT_ID" >> $GITHUB_OUTPUT
          echo "comment_url=$COMMENT_URL" >> $GITHUB_OUTPUT
          echo "comment_author=$COMMENT_AUTHOR" >> $GITHUB_OUTPUT
          echo "file_path=$FILE_PATH" >> $GITHUB_OUTPUT
          echo "line_number=$LINE_NUMBER" >> $GITHUB_OUTPUT

          # Multi-line comment body
          echo "comment_body<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMENT_BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "✅ Extracted comment details:"
          echo "  Type: $COMMENT_TYPE"
          echo "  Author: @$COMMENT_AUTHOR"
          [[ -n "$FILE_PATH" ]] && echo "  File: $FILE_PATH:$LINE_NUMBER"
          echo "  Message preview: ${COMMENT_BODY:0:100}..."

      # yamllint disable rule:line-length
      - name: Craft prompt for Codex
        id: craft-prompt
        if: steps.extract-pr.outputs.has_pr == 'true'
        shell: bash
        run: |
          set -euo pipefail

          BASE_CONTEXT="REPO: ${{ github.repository }}
          PR NUMBER: ${{ steps.extract-pr.outputs.pr_number }}

          ## User Comment Details
          - **Type**: ${{ steps.extract-comment.outputs.comment_type }}
          - **Author**: @${{ steps.extract-comment.outputs.comment_author }}"

          if [[ "${{ steps.extract-comment.outputs.comment_type }}" == "inline_comment" ]]; then
            BASE_CONTEXT="${BASE_CONTEXT}
          - **File**: ${{ steps.extract-comment.outputs.file_path }}:${{ steps.extract-comment.outputs.line_number }}
          - **Comment ID**: ${{ steps.extract-comment.outputs.comment_id }}"
          fi

          COMMENT_BODY=$(cat <<'COMMENT_EOF'
          ${{ steps.extract-comment.outputs.comment_body }}
          COMMENT_EOF
          )

          if [[ "${{ steps.extract-comment.outputs.comment_type }}" == "inline_comment" ]]; then
            FULL_PROMPT="${BASE_CONTEXT}

          ## User's Inline Comment:
          ${COMMENT_BODY}

          ---

          The user has commented on a specific line of code in ${{ steps.extract-comment.outputs.file_path }} at line ${{ steps.extract-comment.outputs.line_number }}.

          Analyze their comment and respond appropriately:
          - If they're asking a question about the code, answer it directly
          - If they're pointing out an issue, acknowledge and discuss it
          - If they're requesting a change, evaluate and respond
          - Focus on the specific code context they're commenting on
          - Be concise and directly relevant to their comment

          CONVERSATIONAL-ONLY RULE (MANDATORY):
          - Never approve a PR and never request changes in this workflow.
          - Never run gh pr review --approve or gh pr review --request-changes.
          - Do not post comments or call GitHub APIs. Write only the reply body; this workflow posts it deterministically."
          else
            FULL_PROMPT="${BASE_CONTEXT}

          ## User's Comment:
          ${COMMENT_BODY}

          ---

          The user has posted a comment on this PR. Analyze what they're asking for:

          - If they're asking a specific question, answer it directly and concisely
          - If they're requesting a specific action, perform it
          - Use your judgment to determine their intent from the comment
          - Focus on conversational Q&A and actionable follow-up

          CONVERSATIONAL-ONLY RULE (MANDATORY):
          - Never approve a PR and never request changes in this workflow.
          - Never run gh pr review --approve or gh pr review --request-changes.
          - Do not post comments or call GitHub APIs. Write only the reply body; this workflow posts it deterministically."
          fi

          echo "prompt<<EOF" >> $GITHUB_OUTPUT
          echo "$FULL_PROMPT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          printf '%s\n' "$FULL_PROMPT" > prompt.txt

          echo "✅ Crafted prompt for comment type: ${{ steps.extract-comment.outputs.comment_type }}"
      # yamllint enable rule:line-length

      - name: Setup Node
        uses: actions/setup-node@v4
        if: steps.extract-pr.outputs.has_pr == 'true'
        with:
          node-version: "22"

      - name: Install Codex CLI
        if: steps.extract-pr.outputs.has_pr == 'true'
        shell: bash
        env:
          PKG_NAME: "@openai/codex"
          CODEX_VERSION: ${{ inputs.codex_version }}
        run: |
          set -euo pipefail
          version="${CODEX_VERSION:-latest}"
          if ! printf '%s' "$version" | grep -qE '^(latest|[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?)$'; then
            echo "::error::CODEX_VERSION must be 'latest' or strict semver MAJOR.MINOR.PATCH; got: $version" >&2
            exit 1
          fi
          resolved="$(npm view "${PKG_NAME}@${version}" version 2>/dev/null | tail -n1 | tr -d '[:space:]')"
          if ! printf '%s' "$resolved" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'; then
            echo "::error::resolved version is not strict semver: $resolved" >&2
            exit 1
          fi
          echo "Installing ${PKG_NAME}@${resolved} (requested: ${version})"
          npm_prefix="${RUNNER_TEMP}/npm-global"
          mkdir -p "$npm_prefix"
          npm config set prefix "$npm_prefix"
          export PATH="${npm_prefix}/bin:${PATH}"
          echo "${npm_prefix}/bin" >> "$GITHUB_PATH"
          npm install -g --ignore-scripts "${PKG_NAME}@${resolved}"
          codex --version

      - name: Configure Codex authentication
        if: steps.extract-pr.outputs.has_pr == 'true'
        shell: bash
        env:
          HOME: ${{ runner.temp }}/codex-home
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
        run: |
          set -euo pipefail
          if [ -z "${CODEX_AUTH_JSON:-}" ]; then
            echo "Need CODEX_AUTH_JSON to run the Codex response workflow." >&2
            exit 1
          fi
          mkdir -p "$HOME/.codex"
          printf '%s' "$CODEX_AUTH_JSON" > "$HOME/.codex/auth.json"
          chmod 600 "$HOME/.codex/auth.json"
          codex login status

      - name: Run Codex response
        id: run-codex
        if: steps.extract-pr.outputs.has_pr == 'true'
        shell: bash
        env:
          HOME: ${{ runner.temp }}/codex-home
          CODEX_MODEL: ${{ inputs.codex_model }}
          CODEX_REASONING_EFFORT: ${{ inputs.codex_reasoning_effort }}
        run: |
          set -euo pipefail
          prompt_content="$(cat prompt.txt)"
          set +e
          codex exec \
            --model "$CODEX_MODEL" \
            -c "model_reasoning_effort=\"${CODEX_REASONING_EFFORT}\"" \
            --dangerously-bypass-approvals-and-sandbox \
            -o codex-output.txt \
            "$prompt_content" \
            > codex-stdout.txt \
            2> codex-error.txt
          status=$?
          set -e
          {
            echo "## Codex PR Response"
            echo
            echo "- PR: #${{ steps.extract-pr.outputs.pr_number }}"
            echo "- Model: $CODEX_MODEL"
            echo "- Reasoning effort: $CODEX_REASONING_EFFORT"
            echo "- Exit code: $status"
            echo
            echo '```'
            if [ -f codex-output.txt ]; then
              cat codex-output.txt
            else
              echo "Codex output file was not created."
            fi
            echo
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$status" -ne 0 ]; then
            if [ -s codex-error.txt ]; then
              cat codex-error.txt >&2
            else
              echo "Codex exited without stderr." >&2
            fi
            exit "$status"
          fi
          if [ ! -s codex-output.txt ]; then
            echo "Codex produced an empty response." >&2
            exit 1
          fi
          cat codex-output.txt

      - name: Post Codex response
        if: steps.extract-pr.outputs.has_pr == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.CODEX_REVIEW_GH_TOKEN }}
          COMMENT_TYPE: ${{ steps.extract-comment.outputs.comment_type }}
          PR_NUMBER: ${{ steps.extract-pr.outputs.pr_number }}
          COMMENT_ID: ${{ steps.extract-comment.outputs.comment_id }}
        run: |
          set -euo pipefail

          if [[ ! -s codex-output.txt ]]; then
            echo "Codex response file is missing or empty." >&2
            exit 1
          fi

          if [[ "$COMMENT_TYPE" == "inline_comment" ]]; then
            response_body="$(cat codex-output.txt)"
            gh api -X POST "/repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/comments" \
              -f body="$response_body" \
              -F in_reply_to="$COMMENT_ID" \
              > /dev/null
          else
            gh pr comment "$PR_NUMBER" \
              --repo "$GITHUB_REPOSITORY" \
              --body-file codex-output.txt
          fi
